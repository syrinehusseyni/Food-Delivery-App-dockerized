name: Food Delivery Microservices CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # =========================
  # USER SERVICE
  # =========================
  user-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build User Service
        working-directory: backend/user-service
        run: mvn clean install


  # =========================
  # ORDER SERVICE
  # =========================
  order-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Order Service
        working-directory: backend/order-service
        run: mvn clean install


  # =========================
  # RESTAURANT SERVICE
  # =========================
  restaurant-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Restaurant Service
        working-directory: backend/restaurant-service
        run: mvn clean install


  # =========================
  # ADMIN SERVICE
  # =========================
  admin-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Admin Service
        working-directory: backend/admin-service
        run: mvn clean install


  # =========================
  # DELIVERY SERVICE
  # =========================
  delivery-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Delivery Service
        working-directory: backend/delivery-service
        run: mvn clean install


  # =========================
  # API GATEWAY
  # =========================
  api-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build API Gateway
        working-directory: backend/api-gateway
        run: mvn clean install


  # =========================
  # EUREKA SERVER
  # =========================
  eureka-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Eureka Server
        working-directory: backend/eureka-server
        run: mvn clean install


  # =========================
  # FRONTEND (VITE FIXED NODE 20+)
  # =========================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20   # ✅ FIXED (Vite requirement)

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build